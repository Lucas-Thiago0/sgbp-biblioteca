<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SGBP - Gestão de Acervo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f8fafc] flex h-screen overflow-hidden" style="font-family: 'Inter', sans-serif;">

<aside class="w-64 bg-[#14b8a6] text-white flex flex-col shrink-0">
    <div class="p-6 text-2xl font-bold tracking-tighter border-b border-white/10">SGBP</div>
    <nav class="flex-1 p-4 space-y-1 mt-4">
        <a href="/dashboard"   class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">📊 Painel Geral</a>
        <a href="/usuarios"    class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">👥 Usuários</a>
        <a href="/livros"      class="block px-4 py-2 bg-white text-[#14b8a6] font-semibold rounded-lg shadow-sm">📚 Acervo</a>
        <a href="/emprestimos" class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">🤝 Empréstimos</a>
        <a href="/reservas"    class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">📅 Reservas</a>
        <a href="/atendimento" class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">🎧 Atendimento</a>
    </nav>
</aside>

<main class="flex-1 flex flex-col overflow-y-auto">
    <header class="p-8 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Gestão de Acervo</h1>
            <p class="text-slate-500">Gerenciar livros e recursos da biblioteca</p>
        </div>
        <a href="/livros/novo" class="bg-[#14b8a6] text-white px-6 py-2.5 rounded-lg font-bold shadow-md hover:bg-[#0d9488] transition">
            + Adicionar Livro
        </a>
    </header>

    <div class="px-8 pb-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] uppercase text-slate-400 font-bold border-b border-slate-100">
                <tr>
                    <th class="px-6 py-4">Título</th>
                    <th class="px-6 py-4">Autor</th>
                    <th class="px-6 py-4">Editora</th>
                    <th class="px-6 py-4">Ano</th>
                    <th class="px-6 py-4">ISBN</th>
                    <th class="px-6 py-4">Categoria</th>
                    <th class="px-6 py-4">Exemplares</th>
                    <th class="px-6 py-4">Status</th>
                    <th class="px-6 py-4 text-center">Ações</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-50 text-xs">
                <tr th:each="livro : ${livros}" class="hover:bg-slate-50/50 transition">
                    <td class="px-6 py-4 font-bold text-slate-700" th:text="${livro.titulo}"></td>
                    <td class="px-6 py-4 text-slate-500" th:text="${livro.autor}"></td>
                    <td class="px-6 py-4 text-slate-500" th:text="${livro.editora}"></td>
                    <td class="px-6 py-4 text-slate-500" th:text="${livro.anoPublicacao}"></td>
                    <td class="px-6 py-4 text-slate-400 font-mono" th:text="${livro.isbn}"></td>
                    <td class="px-6 py-4 text-slate-500" th:text="${livro.categoria}"></td>
                    <td class="px-6 py-4 text-slate-500" th:text="${livro.exemplares}"></td>
                    <td class="px-6 py-4">
                        <a th:href="@{/livros/alternar/{id}(id=${livro.id})}"
                           class="px-2 py-1 rounded text-[10px] font-bold border transition"
                           th:classappend="${livro.disponivel ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-orange-50 text-orange-600 border-orange-100'}"
                           th:text="${livro.disponivel ? 'Disponível' : 'Emprestado'}">
                        </a>
                    </td>
                    <td class="px-6 py-4 text-center space-x-2">
                        <a th:href="@{/livros/editar/{id}(id=${livro.id})}" class="text-slate-300 hover:text-black">✏️</a>
                        <a th:href="@{/livros/excluir/{id}(id=${livro.id})}" class="text-slate-300 hover:text-red-500">🗑️</a>
                    </td>
                </tr>
                <tr th:if="${livros == null or livros.isEmpty()}">
                    <td colspan="9" class="px-6 py-16 text-center text-slate-400">
                        <div class="text-4xl mb-3">📚</div>
                        <div class="font-semibold text-slate-500">Nenhum livro cadastrado</div>
                        <a href="/livros/novo" class="text-xs text-[#14b8a6] font-semibold mt-1 inline-block hover:underline">Adicionar primeiro livro →</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
