<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SGBP - Cadastro de Livro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

<div class="max-w-2xl mx-auto py-16 px-4">
    <div class="mb-10 text-center">
        <h1 class="text-3xl font-bold text-gray-800"
            th:text="${livro.id == null} ? 'Novo Exemplar' : 'Editar Livro'">
            Cadastro de Livro
        </h1>
        <p class="text-gray-500 mt-2">Preencha as informações para atualizar o acervo da UMC.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
        <form th:action="@{/livros}" th:object="${livro}" method="post" class="space-y-6">

            <input type="hidden" th:field="*{id}">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Título do Livro</label>
                <input type="text" th:field="*{titulo}" placeholder="Ex: Engenharia de Software Moderna"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black focus:border-transparent outline-none transition" required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Autor</label>
                    <input type="text" th:field="*{autor}" placeholder="Nome do autor"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">ISBN</label>
                    <input type="text" th:field="*{isbn}" placeholder="000-00-0000-000-0"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black outline-none transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Ano de Publicação</label>
                    <input type="number" th:field="*{anoPublicacao}" placeholder="2024"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black outline-none transition">
                </div>
                <div class="flex items-end pb-3">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" th:field="*{disponivel}" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-black"></div>
                        <span class="ml-3 text-sm font-medium text-gray-700">Disponível para empréstimo</span>
                    </label>
                </div>
            </div>

            <div class="pt-6 flex items-center justify-end space-x-4 border-t border-gray-50">
                <a href="/livros" class="text-gray-500 hover:text-gray-800 font-medium transition">Cancelar</a>
                <button type="submit" class="bg-black text-white px-8 py-3 rounded-xl font-bold hover:bg-gray-800 transition shadow-lg active:scale-95">
                    Salvar Alterações
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
