<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SGBP - Cadastro de Livro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f8fafc] flex h-screen overflow-hidden" style="font-family: 'Inter', sans-serif;">

<!-- ===== SIDEBAR (igual ao lista-livros.html) ===== -->
<aside class="w-64 bg-[#14b8a6] text-white flex flex-col shrink-0">
    <div class="p-6 text-2xl font-bold tracking-tighter border-b border-white/10">SGBP</div>
    <nav class="flex-1 p-4 space-y-1 mt-4">
        <a href="/dashboard" class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">📊 Painel Geral</a>
        <a href="/usuarios"  class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">👥 Usuários</a>
        <a href="/livros"    class="block px-4 py-2 bg-white text-[#14b8a6] font-semibold rounded-lg shadow-sm">📚 Acervo</a>
        <a href="/emprestimos" class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">🤝 Empréstimos</a>
        <a href="/reservas"  class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">📅 Reservas</a>
        <a href="/atendimento" class="block px-4 py-2 hover:bg-white/10 rounded-lg text-white/80">🎧 Atendimento</a>
    </nav>
</aside>

<!-- ===== CONTEÚDO PRINCIPAL ===== -->
<main class="flex-1 flex flex-col overflow-y-auto">
    <header class="p-8 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-bold text-slate-800"
                th:text="${livro.id == null} ? 'Novo Livro' : 'Editar Livro'">
                Cadastro de Livro
            </h1>
            <p class="text-slate-500 mt-1">Preencha os campos abaixo para atualizar o acervo da UMC.</p>
        </div>
        <a href="/livros" class="text-slate-500 hover:text-slate-800 font-medium transition flex items-center gap-1">
            ← Voltar para Acervo
        </a>
    </header>

    <div class="px-8 pb-10">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-3xl">

            <form th:action="@{/livros}" th:object="${livro}" method="post" class="space-y-6">

                <!-- Campo oculto de ID (essencial para o upsert funcionar) -->
                <input type="hidden" th:field="*{id}">

                <!-- ── LINHA 1: Título ── -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Título do Livro *</label>
                    <input type="text" th:field="*{titulo}"
                           placeholder="Ex: Engenharia de Software Moderna"
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#14b8a6] focus:border-transparent outline-none transition text-sm"
                           required>
                </div>

                <!-- ── LINHA 2: Autor + Editora ── -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Autor *</label>
                        <input type="text" th:field="*{autor}"
                               placeholder="Nome do autor"
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#14b8a6] outline-none transition text-sm"
                               required>
                    </div>
                    <!-- ✅ CAMPO EDITORA — estava faltando no formulário original -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Editora</label>
                        <input type="text" th:field="*{editora}"
                               placeholder="Ex: Pearson, Atlas, O'Reilly"
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#14b8a6] outline-none transition text-sm">
                    </div>
                </div>

                <!-- ── LINHA 3: ISBN + Ano ── -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">ISBN</label>
                        <input type="text" th:field="*{isbn}"
                               placeholder="000-00-0000-000-0"
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#14b8a6] outline-none transition text-sm font-mono">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Ano de Publicação</label>
                        <input type="number" th:field="*{anoPublicacao}"
                               placeholder="2024" min="1800" max="2099"
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#14b8a6] outline-none transition text-sm">
                    </div>
                </div>

                <!-- ── LINHA 4: Categoria + Exemplares ── -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- ✅ CAMPO CATEGORIA — estava faltando no formulário original -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Categoria</label>
                        <select th:field="*{categoria}"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#14b8a6] outline-none transition text-sm bg-white">
                            <option value="">Selecione uma categoria</option>
                            <option value="Engenharia de Software">Engenharia de Software</option>
                            <option value="Banco de Dados">Banco de Dados</option>
                            <option value="Redes de Computadores">Redes de Computadores</option>
                            <option value="Inteligência Artificial">Inteligência Artificial</option>
                            <option value="Algoritmos e Estruturas de Dados">Algoritmos e Estruturas de Dados</option>
                            <option value="Arquitetura de Software">Arquitetura de Software</option>
                            <option value="Matemática">Matemática</option>
                            <option value="Física">Física</option>
                            <option value="Administração">Administração</option>
                            <option value="Direito">Direito</option>
                            <option value="Literatura">Literatura</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <!-- ✅ CAMPO EXEMPLARES — estava faltando no formulário original -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nº de Exemplares</label>
                        <input type="number" th:field="*{exemplares}"
                               placeholder="1" min="0"
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#14b8a6] outline-none transition text-sm">
                    </div>
                </div>

                <!-- ── LINHA 5: Localização + Disponível ── -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 items-end">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Localização (Estante/Seção)</label>
                        <input type="text" th:field="*{localizacao}"
                               placeholder="Ex: A-12, Seção Informática"
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#14b8a6] outline-none transition text-sm">
                    </div>
                    <div class="flex items-center gap-3 pb-3">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" th:field="*{disponivel}" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#14b8a6]"></div>
                            <span class="ml-3 text-sm font-medium text-slate-700">Disponível para empréstimo</span>
                        </label>
                    </div>
                </div>

                <!-- ── BOTÕES ── -->
                <div class="pt-6 flex items-center justify-end gap-4 border-t border-slate-100">
                    <a href="/livros" class="text-slate-500 hover:text-slate-800 font-medium transition text-sm">
                        Cancelar
                    </a>
                    <button type="submit"
                            class="bg-[#14b8a6] hover:bg-[#0d9488] text-white px-8 py-3 rounded-xl font-bold transition shadow-md active:scale-95 text-sm">
                        Salvar Livro
                    </button>
                </div>

            </form>
        </div>
    </div>
</main>

</body>
</html>
