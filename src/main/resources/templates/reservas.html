<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SGBP - Gestão de Reservas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc] flex h-screen font-['Inter']">
<main class="flex-1 overflow-y-auto p-8">
    <header class="flex justify-between items-start mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Gestão de Reservas</h1>
            <p class="text-slate-500">Gerenciar reservas e fila de espera de livros</p>
        </div>
        <button class="bg-[#14b8a6] text-white px-6 py-2 rounded-lg font-bold shadow-md">+ Nova Reserva</button>
    </header>

    <div class="grid grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Reservas Pendentes</p>
            <h2 class="text-2xl font-bold">3</h2>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="font-bold text-slate-700 mb-6 italic">Fila de Espera por Livro</h3>
        <div class="space-y-6">
            <div class="border-l-4 border-[#14b8a6] pl-4">
                <p class="font-bold text-sm text-slate-800">1984 (George Orwell)</p>
                <div class="flex items-center gap-3 mt-2">
                    <div class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-xs">RS</div>
                    <span class="text-xs text-slate-600">Ricardo Sousa - Reservado em 22/03/2026</span>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
